workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: com.smarttrading.d366
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
