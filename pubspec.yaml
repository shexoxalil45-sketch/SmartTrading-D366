name: smarttrading_d366
description: SmartTrading-D366 — AI Based Trading Bot
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client (صحيح وحديث)
  http: ^1.2.2

  # Websocket real-time trading
  web_socket_channel: ^2.4.0

  # JSON Serialization
  json_annotation: ^4.9.0

  # State management (الأفضل والأخف)
  provider: ^6.1.2

  # Local database for caching trading data
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Encryption
  encrypt: ^5.0.3

  # Secure storage (API keys)
  flutter_secure_storage: ^9.2.2

  # Logging
  logger: ^2.0.2+1

  # UI / Animations
  flutter_spinkit: ^5.2.0
  lottie: ^3.1.2

  # Connectivity check
  connectivity_plus: ^6.0.2

  # intl for numbers & dates
  intl: ^0.19.0

  # Firebase (Optional ready)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

  # Charts (Trading Candle)
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.10
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
